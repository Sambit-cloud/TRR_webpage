<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - TRR Electric</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<section class="page-hero">
    <h1>GALLERY</h1>
    <p>Behind the scenes, on the track, and in the workshop.</p>
</section>

<section class="gallery-section">

    <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="car">The Car</button>
        <button class="filter-btn" data-filter="team">Team</button>
        <button class="filter-btn" data-filter="events">Events</button>
    </div>

    <div class="gallery-grid">

        <!-- Team -->
        <div class="gallery-item" data-category="team">
            <img src="{{ url_for('static', filename='group.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Team Photo</span>
            </div>
        </div>

        <div class="gallery-item" data-category="team">
            <img src="{{ url_for('static', filename='trr.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Workshop</span>
            </div>
        </div>

        <!-- Events -->
        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb2.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb3.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb4.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb5.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <div class="gallery-item" data-category="events">
            <img src="{{ url_for('static', filename='trrfb6.jpeg') }}" alt="">
            <div class="gallery-overlay">
                <span>Event</span>
            </div>
        </div>

        <!-- Car -->
        <div class="gallery-item" data-category="car">
            <img src="{{ url_for('static', filename='car1.jpg') }}" alt="">
            <div class="gallery-overlay">
                <span>The Car</span>
            </div>
        </div>

    </div>

</section>

<script>

const filterButtons = document.querySelectorAll(".filter-btn");
const galleryItems = document.querySelectorAll(".gallery-item");

filterButtons.forEach(button => {

    button.addEventListener("click", () => {

        filterButtons.forEach(btn =>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        const filter = button.dataset.filter;

        galleryItems.forEach(item => {

            if (filter === "all" || item.dataset.category === filter) {
                item.style.display = "block";
            }
            else {
                item.style.display = "none";
            }

        });

    });

});

</script>

</body>
</html>
